<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>개념기반 에드테크 단원 플래너</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .page-layout {
            display: flex;
            gap: 24px;
            align-items: flex-start;
        }
        .main-content {
            flex: 1;
            min-width: 0;
        }
        .game-hub {
            width: 220px;
            flex-shrink: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 24px 20px;
        }
        .game-hub h2 {
            font-size: 1em;
            color: #64748b;
            margin-bottom: 16px;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .game-btn {
            display: block;
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .game-btn:hover {
            opacity: 0.88;
        }
        @media (max-width: 700px) {
            .page-layout {
                flex-direction: column;
            }
            .game-hub {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>개념기반 에드테크 단원 플래너</h1>
            <p class="subtitle">개념기반 교육과정 × 에드테크 활용 단원 설계 아카이브</p>
        </header>

        <div class="page-layout">
            <div class="main-content">
                <div id="unit-list"></div>
            </div>
            <aside class="game-hub">
                <h2>🎮 게임 모음</h2>
                <a class="game-btn" href="domino-challenge.html">훼손된 체스판<br>도미노 도전</a>
            </aside>
        </div>

        <footer class="footer">
            <p>Powered by Claude Agent · Concept-Based Curriculum Design</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
